name: Circuit Breaker

on:
  issue_comment:
    types: [created]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Count comments and escalate if needed
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const agentComments = comments.data.filter(c =>
              c.body.startsWith('[VERDICT]') || c.body.startsWith('[SCOUT]')
            );

            if (agentComments.length >= 20) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['escalation']
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '⚠️ **CIRCUIT BREAKER** — 20+ agent comments reached. Both agents: STOP. Escalating to Nick.'
              });
            }
